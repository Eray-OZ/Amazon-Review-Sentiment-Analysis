<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irony-Aware Amazon Sentiment Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .irony-alert {
            color: #856404;
            background-color: #fff3cd;
            border-color: #ffeeba;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container" style="max-width: 600px;">
        <h2 class="text-center mb-4">🤖 Irony-Aware Sentiment Analizi</h2>
        <p class="text-center text-muted">Amazon Yorumları & Kinaye Tespiti Hibrit Modeli</p>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="mb-3">
                    <label for="reviewText" class="form-label">Test Etmek İstediğiniz Yorumu Girin:</label>
                    <textarea class="form-control" id="reviewText" rows="4"
                        placeholder="I absolutely adore how this stopped working..."></textarea>
                </div>
                <button class="btn btn-primary w-100" onclick="analyzeText()">Analiz Et</button>
            </div>
        </div>

        <div id="resultBox" class="result-box bg-white shadow-sm border">
            <div id="ironyAlert" class="irony-alert">
                ⚠️ KİNAYE TESPİT EDİLDİ! (Model arka planda [IRONIC] etiketini ekledi)
            </div>
            <h4 class="text-center" id="sentimentResult"></h4>
            <hr>
            <p class="mb-1"><strong>Duygu Güveni:</strong> <span id="confidenceText"></span></p>
            <p class="mb-1"><strong>Kinaye İhtimali:</strong> <span id="ironyConfidence"></span></p>
            <p class="mb-0 text-muted" style="font-size: 0.85em;"><strong>Modelin Gördüğü Metin:</strong> <span
                    id="processedText"></span></p>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('reviewText').value;
            if (!text) { alert('Lütfen bir metin girin!'); return; }

            document.getElementById('sentimentResult').innerHTML = "⏳ Analiz ediliyor...";
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('ironyAlert').style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById('sentimentResult').innerHTML = "❌ Hata: " + data.error;
                    return;
                }

                document.getElementById('sentimentResult').innerHTML = data.emoji + " " + data.sentiment;
                document.getElementById('confidenceText').innerText = data.confidence;
                document.getElementById('ironyConfidence').innerText = data.irony_confidence;
                document.getElementById('processedText').innerText = data.processed_text;

                // Eğer ironi varsa uyarıyı göster
                if (data.is_ironic) {
                    document.getElementById('ironyAlert').style.display = 'block';
                }

            } catch (error) {
                document.getElementById('sentimentResult').innerHTML = "❌ Bir hata oluştu.";
            }
        }
    </script>

</body>

</html>
