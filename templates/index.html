<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Yorum Analizi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .positive {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .negative {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Amazon Yorum Duygu Analizi</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="reviewText" class="form-label">Analiz edilecek İngilizce yorumu buraya
                                yapıştırın:</label>
                            <textarea class="form-control" id="reviewText" rows="5"
                                placeholder="I absolutely loved this product..."></textarea>
                        </div>
                        <button id="analyzeBtn" class="btn btn-primary w-100">Analiz Et</button>

                        <div id="resultBox" class="result-box">
                            <h2 id="sentimentText"></h2>
                            <p>Eminlik Oranı: <strong id="confidenceText"></strong></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const text = document.getElementById('reviewText').value;
            const resultBox = document.getElementById('resultBox');
            const btn = document.getElementById('analyzeBtn');

            if (!text) {
                alert("Lütfen bir yorum girin!");
                return;
            }

            // Butonu yükleniyor durumuna al
            btn.disabled = true;
            btn.innerText = "Analiz ediliyor...";
            resultBox.style.display = "none";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('sentimentText').innerText = `${data.sentiment} ${data.emoji}`;
                    document.getElementById('confidenceText').innerText = data.confidence;

                    // Renklendirme
                    resultBox.className = 'result-box ' + (data.sentiment === 'Pozitif' ? 'positive' : 'negative');
                    resultBox.style.display = "block";
                } else {
                    alert("Hata: " + data.error);
                }
            } catch (error) {
                alert("Sunucuya bağlanılamadı!");
            }

            // Butonu eski haline getir
            btn.disabled = false;
            btn.innerText = "Analiz Et";
        });
    </script>

</body>

</html>
